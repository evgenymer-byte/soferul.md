name: Update Fuel Prices Daily

on:
  schedule:
    - cron: '0 11 * * *'  # Every day at 11:00 UTC (13:00 Chisinau)
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape ANRE prices
        run: python scripts/fetch_prices.py

      - name: Commit and push prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Auto-update fuel prices $(date +%Y-%m-%d)"
          git push

